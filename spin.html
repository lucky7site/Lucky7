<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucky Spin – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--gold:#ffd700;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(255,215,0,0.08) 0%,transparent 70%);pointer-events:none;}

/* TOP */
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--gold);}
.balance-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:5px;}

/* WHEEL */
.wheel-section{display:flex;flex-direction:column;align-items:center;padding:30px 20px;width:100%;}
.wheel-wrap{position:relative;width:280px;height:280px;margin:0 auto;}
.wheel-pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:30px;z-index:10;filter:drop-shadow(0 0 8px var(--gold));}
canvas#wheel{width:280px;height:280px;border-radius:50%;box-shadow:0 0 30px rgba(255,215,0,0.25),0 0 60px rgba(180,79,255,0.15);}
.spin-btn{margin-top:28px;padding:16px 48px;border:none;border-radius:18px;background:linear-gradient(90deg,var(--gold),#ff8c00);font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:#000;cursor:pointer;letter-spacing:2px;box-shadow:0 0 20px rgba(255,215,0,0.4);transition:all .2s;}
.spin-btn:disabled{opacity:0.5;pointer-events:none;}
.spin-btn:active{transform:scale(0.95);}

/* BET */
.bet-row{display:flex;gap:10px;margin-top:20px;align-items:center;}
.bet-label{font-size:14px;color:var(--muted);font-weight:600;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:100px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--gold);}

/* RESULT */
.result-box{margin-top:22px;width:90%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:18px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-label{font-size:13px;color:var(--muted);margin-bottom:4px;}
.result-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;}

/* WIN ANIM */
@keyframes winPop{0%{transform:scale(0.8)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.win-anim{animation:winPop .4s ease;}

/* HISTORY */
.history{width:90%;max-width:320px;margin-top:16px;margin-bottom:30px;}
.history-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.history-list{display:flex;flex-wrap:wrap;gap:6px;}
.h-item{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;}
.h-win{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.h-lose{background:rgba(255,68,102,0.12);color:#ff4466;border:1px solid rgba(255,68,102,0.2);}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:#ff4466;color:#ff4466;}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">🎰 Lucky Spin</div>
  <div class="balance-chip" id="balChip">🪙 0</div>
</header>

<div class="wheel-section">
  <div class="wheel-wrap">
    <div class="wheel-pointer">▼</div>
    <canvas id="wheel" width="280" height="280"></canvas>
  </div>

  <div class="bet-row">
    <span class="bet-label">Bet:</span>
    <input type="number" class="bet-input" id="betAmt" value="10" min="1">
    <span class="bet-label">Coins</span>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN!</button>

  <div class="result-box" id="resultBox">
    <div class="result-label">Spin the wheel to win coins!</div>
    <div class="result-val" id="resultVal">—</div>
  </div>

  <div class="history">
    <div class="history-title">Recent Results</div>
    <div class="history-list" id="histList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const segments = [
  {label:'2x',color:'#b44fff',mult:2},
  {label:'LOSE',color:'#ff4466',mult:0},
  {label:'1.5x',color:'#00c8ff',mult:1.5},
  {label:'LOSE',color:'#331a00',mult:0},
  {label:'3x',color:'#ffd700',mult:3},
  {label:'LOSE',color:'#1a0033',mult:0},
  {label:'1x',color:'#00ff88',mult:1},
  {label:'5x',color:'#ff8c00',mult:5},
];
const NUM = segments.length;
const ARC = (2*Math.PI)/NUM;
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
let angle = 0;
let spinning = false;

function drawWheel(rot=0){
  ctx.clearRect(0,0,280,280);
  const cx=140,cy=140,r=130;
  segments.forEach((s,i)=>{
    const start = rot + i*ARC - Math.PI/2;
    const end = start + ARC;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle=s.color; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=2; ctx.stroke();
    // text
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(start+ARC/2);
    ctx.textAlign='right'; ctx.fillStyle='#fff';
    ctx.font='bold 13px Orbitron,sans-serif'; ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText(s.label,r-14,5); ctx.restore();
  });
  // center circle
  ctx.beginPath(); ctx.arc(cx,cy,22,0,2*Math.PI);
  ctx.fillStyle='#0a0a14'; ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,0.4)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#ffd700'; ctx.font='bold 14px Orbitron,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('7',cx,cy+1);
}
drawWheel();

let balance = parseInt(localStorage.getItem('l7_balance')||'0');
function updateBal(){ localStorage.setItem('l7_balance',balance); document.getElementById('balChip').textContent='🪙 '+balance; }
updateBal();

function spin(){
  const bet = parseInt(document.getElementById('betAmt').value)||10;
  if(bet<1||bet>balance){ showToast('Not enough coins!','lose'); return; }
  spinning=true; document.getElementById('spinBtn').disabled=true;
  balance -= bet; updateBal();

  const extra = 5+Math.floor(Math.random()*5);
  const targetSeg = Math.floor(Math.random()*NUM);
  const targetAngle = -(targetSeg*ARC) - (ARC/2) + (extra*2*Math.PI);
  const duration = 3000+Math.random()*1000;
  const start = Date.now(); const startAngle = angle;

  function animate(){
    const elapsed = Date.now()-start;
    const t = Math.min(elapsed/duration,1);
    const ease = 1-(1-t)*(1-t)*(1-t);
    angle = startAngle + targetAngle*ease;
    drawWheel(angle);
    if(t<1){ requestAnimationFrame(animate); }
    else {
      spinning=false; document.getElementById('spinBtn').disabled=false;
      showResult(bet, targetSeg);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(bet, segIdx){
  const seg = segments[segIdx];
  const rb = document.getElementById('resultBox');
  const rv = document.getElementById('resultVal');
  if(seg.mult===0){
    rv.textContent='LOSE 😢'; rv.style.color='#ff4466';
    rb.style.borderColor='#ff4466'; rb.classList.remove('win-anim');
    void rb.offsetWidth; rb.classList.add('win-anim');
    showToast('-'+bet+' Coins! 😢','lose');
  } else {
    const win = Math.floor(bet*seg.mult);
    balance += win; updateBal();
    rv.textContent='+'+win+' 🪙 ('+seg.label+')'; rv.style.color='var(--green)';
    rb.style.borderColor='var(--green)'; rb.classList.remove('win-anim');
    void rb.offsetWidth; rb.classList.add('win-anim');
    showToast('Won '+win+' Coins! 🎉','win');
  }
  addHistory(seg.mult>0 ? '+'+Math.floor(bet*seg.mult) : '-'+bet, seg.mult>0);
}

function addHistory(label, win){
  const list = document.getElementById('histList');
  const el = document.createElement('div');
  el.className='h-item '+(win?'h-win':'h-lose');
  el.textContent=label;
  list.prepend(el);
  if(list.children.length>10) list.removeChild(list.lastChild);
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
