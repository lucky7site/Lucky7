<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Card Pick – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(180,79,255,0.08) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--purple);}
.balance-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}

.game-body{display:flex;flex-direction:column;align-items:center;padding:24px 20px;width:100%;gap:20px;}
.instructions{font-size:14px;color:var(--muted);text-align:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px 16px;width:90%;max-width:340px;}

/* CARDS */
.card-row{display:flex;gap:14px;justify-content:center;perspective:800px;}
.card{width:80px;height:120px;border-radius:14px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.card.flipped{transform:rotateY(180deg);}
.card-front,.card-back{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.card-back{background:linear-gradient(135deg,#1a0040,#330066);border:1px solid rgba(180,79,255,0.3);box-shadow:0 0 14px rgba(180,79,255,0.15);}
.card-back-pattern{font-size:28px;opacity:0.5;}
.card-back-label{font-family:'Orbitron',sans-serif;font-size:8px;color:rgba(255,255,255,0.4);margin-top:4px;letter-spacing:1px;}
.card-front{transform:rotateY(180deg);border:1px solid var(--border);}
.card.shuffling{animation:shuffle 0.15s linear;}
@keyframes shuffle{0%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}100%{transform:translateX(0)}}

/* card colors */
.card-front.gold{background:linear-gradient(135deg,#3d2200,#7a4400);border-color:rgba(255,215,0,0.4);}
.card-front.purple{background:linear-gradient(135deg,#1a0040,#4d00aa);border-color:rgba(180,79,255,0.4);}
.card-front.blue{background:linear-gradient(135deg,#001a3d,#004d99);border-color:rgba(0,200,255,0.4);}
.card-front.green{background:linear-gradient(135deg,#001a0d,#004d22);border-color:rgba(0,255,136,0.4);}
.card-front.red{background:linear-gradient(135deg,#1a0008,#660022);border-color:rgba(255,68,102,0.4);}
.card-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;}
.card-suit{font-size:18px;margin-top:4px;}
.card-mult{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;margin-top:4px;}

/* BET + SHUFFLE */
.controls{display:flex;flex-direction:column;gap:12px;align-items:center;width:90%;max-width:340px;}
.bet-row{display:flex;gap:10px;align-items:center;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:90px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--purple);}
.shuffle-btn{border:none;border-radius:14px;padding:12px 28px;background:linear-gradient(90deg,#660099,var(--purple));font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:1px;transition:.2s;}
.shuffle-btn:disabled{opacity:0.4;pointer-events:none;}
.shuffle-btn:active{transform:scale(0.95);}

/* RESULT */
.result-box{width:90%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:18px;text-align:center;}
.result-msg{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;margin:4px 0;}
.result-detail{font-size:13px;color:var(--muted);margin-top:4px;}

/* HIST */
.hist-row{display:flex;gap:6px;overflow-x:auto;width:90%;max-width:320px;padding-bottom:20px;scrollbar-width:none;}
.hist-row::-webkit-scrollbar{display:none;}
.hc{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;flex-shrink:0;}
.hc-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.hc-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">🃏 Card Pick</div>
  <div class="balance-chip" id="balChip">🪙 0</div>
</header>

<div class="game-body">
  <div class="instructions">🃏 Shuffle the cards, then pick one. Win if you find the Golden card!</div>

  <div class="card-row" id="cardRow"></div>

  <div class="controls">
    <div class="bet-row">
      <span style="color:var(--muted);font-size:14px;font-weight:600;">Bet:</span>
      <input type="number" class="bet-input" id="betAmt" value="10" min="1">
      <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleCards()">🔀 SHUFFLE</button>
    </div>
  </div>

  <div class="result-box" id="resultBox">
    <div style="font-size:36px">🃏</div>
    <div class="result-msg" style="color:var(--muted)">Shuffle & pick a card</div>
    <div class="result-detail">Golden card = 3x your bet!</div>
  </div>

  <div class="hist-row" id="histRow"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const cardDefs=[
  {val:'7',suit:'♠',color:'purple',mult:0,label:'LOSE',glow:'rgba(180,79,255,0.3)'},
  {val:'K',suit:'♥',color:'red',mult:0,label:'LOSE',glow:'rgba(255,68,102,0.3)'},
  {val:'A',suit:'★',color:'gold',mult:3,label:'3x WIN',glow:'rgba(255,215,0,0.5)'},
  {val:'J',suit:'♦',color:'blue',mult:0,label:'LOSE',glow:'rgba(0,200,255,0.3)'},
  {val:'Q',suit:'♣',color:'green',mult:1.5,label:'1.5x',glow:'rgba(0,255,136,0.3)'},
];
let balance=parseInt(localStorage.getItem('l7_balance')||'0');
function updateBal(){localStorage.setItem('l7_balance',balance);document.getElementById('balChip').textContent='🪙 '+balance;}
updateBal();

let order=[], canPick=false, betActive=0;

function buildCards(){
  const row=document.getElementById('cardRow');
  row.innerHTML='';
  order=[0,1,2,3,4];
  order.forEach((idx,pos)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.idx=idx;
    card.innerHTML=`<div class="card-back"><div class="card-back-pattern">★</div><div class="card-back-label">LUCKY7</div></div>
    <div class="card-front ${cardDefs[idx].color}">
      <div class="card-val" style="color:${cardDefs[idx].color==='gold'?'#ffd700':cardDefs[idx].color==='red'?'#ff4466':cardDefs[idx].color==='purple'?'#b44fff':cardDefs[idx].color==='blue'?'#00c8ff':'#00ff88'}">${cardDefs[idx].val}</div>
      <div class="card-suit">${cardDefs[idx].suit}</div>
      <div class="card-mult" style="color:rgba(255,255,255,0.6)">${cardDefs[idx].label}</div>
    </div>`;
    card.addEventListener('click',()=>pickCard(card,idx));
    row.appendChild(card);
  });
}
buildCards();

function shuffleCards(){
  const bet=parseInt(document.getElementById('betAmt').value)||10;
  if(bet<1||bet>balance){showToast('Not enough coins!','lose');return;}
  balance-=bet; updateBal(); betActive=bet;
  canPick=false;
  document.getElementById('shuffleBtn').disabled=true;
  // Reset all cards
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('flipped'));
  const row=document.getElementById('cardRow');
  // shuffle animation
  let ticks=0;
  const cards=[...row.children];
  const inter=setInterval(()=>{
    // random swap visual positions via order
    for(let i=cards.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      row.appendChild(cards[i]);
    }
    cards.forEach(c=>c.classList.toggle('shuffling',ticks%2===0));
    ticks++;
    if(ticks>12){
      clearInterval(inter);
      cards.forEach(c=>c.classList.remove('shuffling'));
      canPick=true;
      document.getElementById('resultBox').innerHTML=`<div style="font-size:36px">👆</div><div class="result-msg" style="color:var(--purple)">PICK A CARD!</div><div class="result-detail">Tap any card to reveal</div>`;
    }
  },100);
}

function pickCard(cardEl,idx){
  if(!canPick)return;
  canPick=false;
  // Flip all
  document.querySelectorAll('.card').forEach(c=>{
    setTimeout(()=>c.classList.add('flipped'),Math.random()*400);
  });
  setTimeout(()=>showResult(idx),700);
}

function showResult(idx){
  const def=cardDefs[idx];
  const rb=document.getElementById('resultBox');
  if(def.mult===0){
    rb.innerHTML=`<div style="font-size:36px">😢</div><div class="result-msg" style="color:var(--red)">WRONG CARD! -${betActive}</div><div class="result-detail">You picked ${def.val}${def.suit} — Try again!</div>`;
    showToast('Wrong card! -'+betActive+' Coins','lose');
    addHist('-'+betActive,false);
  } else {
    const win=Math.floor(betActive*def.mult);
    balance+=win; updateBal();
    rb.innerHTML=`<div style="font-size:36px">🎉</div><div class="result-msg" style="color:var(--green)">YOU WON! +${win} 🪙</div><div class="result-detail">You picked ${def.val}${def.suit} (${def.label}) !</div>`;
    showToast('Won +'+win+' Coins! 🃏','win');
    addHist('+'+win,true);
  }
  setTimeout(()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('flipped'));
    document.getElementById('shuffleBtn').disabled=false;
    document.getElementById('resultBox').innerHTML=`<div style="font-size:36px">🃏</div><div class="result-msg" style="color:var(--muted)">Shuffle for next round</div><div class="result-detail">Golden card = 3x your bet!</div>`;
  },3000);
}

function addHist(label,win){
  const row=document.getElementById('histRow');
  const el=document.createElement('div');
  el.className='hc '+(win?'hc-w':'hc-l');
  el.textContent=label; row.prepend(el);
  if(row.children.length>10)row.removeChild(row.lastChild);
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
