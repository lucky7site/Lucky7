<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Number Guess – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--orange:#ff6b35;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,107,53,0.07) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--orange);}
.balance-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}

.game-body{display:flex;flex-direction:column;align-items:center;padding:28px 20px;width:100%;gap:20px;}

/* NUMBER DISPLAY */
.mystery-num{width:120px;height:120px;background:rgba(255,255,255,0.05);border:2px solid var(--border);border-radius:24px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;position:relative;overflow:hidden;}
.mystery-num::after{content:'?';font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;color:var(--orange);text-shadow:0 0 20px var(--orange);}
.mystery-num.reveal::after{display:none;}
.mystery-val{position:absolute;font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;display:none;}
.mystery-num.reveal .mystery-val{display:flex;align-items:center;justify-content:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}

/* NUMBER GRID */
.num-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:90%;max-width:320px;}
.num-btn{border:1px solid var(--border);border-radius:14px;padding:14px 0;background:rgba(255,255,255,0.04);font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:.2s;color:var(--text);}
.num-btn.selected{background:linear-gradient(135deg,rgba(255,107,53,0.2),rgba(255,215,0,0.1));border-color:var(--orange);color:var(--orange);box-shadow:0 0 12px rgba(255,107,53,0.25);}
.num-btn.correct{background:linear-gradient(135deg,rgba(0,255,136,0.2),rgba(0,200,255,0.1));border-color:var(--green);color:var(--green);}
.num-btn.wrong{background:rgba(255,68,102,0.12);border-color:var(--red);color:var(--red);}
.num-btn:active{transform:scale(0.9);}
.num-btn:disabled{pointer-events:none;}

/* BET + GUESS */
.action-row{display:flex;gap:10px;align-items:center;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:90px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--orange);}
.guess-btn{border:none;border-radius:14px;padding:12px 24px;background:linear-gradient(90deg,#aa3300,var(--orange));font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:1px;transition:.2s;}
.guess-btn:disabled{opacity:0.4;pointer-events:none;}
.guess-btn:active{transform:scale(0.95);}

/* RESULT */
.result-box{width:90%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:18px;text-align:center;}
.result-msg{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;margin:6px 0;}
.result-detail{font-size:13px;color:var(--muted);}

/* STREAK */
.streak-bar{width:90%;max-width:320px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.streak-item{text-align:center;}
.streak-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--orange);}
.streak-label{font-size:11px;color:var(--muted);margin-top:2px;}

/* HIST */
.hist-row{display:flex;gap:6px;overflow-x:auto;width:90%;max-width:320px;padding-bottom:20px;scrollbar-width:none;}
.hist-row::-webkit-scrollbar{display:none;}
.hc{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;flex-shrink:0;}
.hc-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.hc-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">🔢 Number Guess</div>
  <div class="balance-chip" id="balChip">🪙 0</div>
</header>

<div class="game-body">

  <div class="mystery-num" id="mysteryNum">
    <div class="mystery-val" id="mysteryVal"></div>
  </div>

  <div class="num-grid" id="numGrid">
    <button class="num-btn" onclick="selectNum(1)">1</button>
    <button class="num-btn" onclick="selectNum(2)">2</button>
    <button class="num-btn" onclick="selectNum(3)">3</button>
    <button class="num-btn" onclick="selectNum(4)">4</button>
    <button class="num-btn" onclick="selectNum(5)">5</button>
    <button class="num-btn" onclick="selectNum(6)">6</button>
    <button class="num-btn" onclick="selectNum(7)">7</button>
    <button class="num-btn" onclick="selectNum(8)">8</button>
    <button class="num-btn" onclick="selectNum(9)">9</button>
    <button class="num-btn" onclick="selectNum(10)">10</button>
  </div>

  <div class="action-row">
    <span style="color:var(--muted);font-size:14px;font-weight:600;">Bet:</span>
    <input type="number" class="bet-input" id="betAmt" value="10" min="1">
    <button class="guess-btn" id="guessBtn" onclick="makeGuess()">GUESS!</button>
  </div>

  <div class="result-box" id="resultBox">
    <div style="font-size:36px">🔢</div>
    <div class="result-msg" style="color:var(--muted)">Pick 1–10 and guess!</div>
    <div class="result-detail">Correct = 8x your bet!</div>
  </div>

  <div class="streak-bar">
    <div class="streak-item"><div class="streak-val" id="winsCount">0</div><div class="streak-label">WINS</div></div>
    <div class="streak-item"><div class="streak-val" id="streakCount" style="color:var(--gold)">0</div><div class="streak-label">STREAK 🔥</div></div>
    <div class="streak-item"><div class="streak-val" id="lossesCount" style="color:var(--red)">0</div><div class="streak-label">LOSSES</div></div>
  </div>

  <div class="hist-row" id="histRow"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let balance=parseInt(localStorage.getItem('l7_balance')||'0');
let selected=null, wins=0, losses=0, streak=0;
function updateBal(){localStorage.setItem('l7_balance',balance);document.getElementById('balChip').textContent='🪙 '+balance;}
updateBal();

function selectNum(n){
  selected=n;
  document.querySelectorAll('.num-btn').forEach((b,i)=>b.classList.toggle('selected',i===n-1));
}

function makeGuess(){
  if(!selected){showToast('Pick a number first!','lose');return;}
  const bet=parseInt(document.getElementById('betAmt').value)||10;
  if(bet<1||bet>balance){showToast('Not enough coins!','lose');return;}
  balance-=bet; updateBal();
  document.getElementById('guessBtn').disabled=true;
  document.querySelectorAll('.num-btn').forEach(b=>b.disabled=true);

  // animate ?
  let ticks=0;
  const inter=setInterval(()=>{
    document.getElementById('mysteryNum').style.borderColor=`hsl(${Math.random()*360},80%,50%)`;
    ticks++;
    if(ticks>12){
      clearInterval(inter);
      const answer=Math.ceil(Math.random()*10);
      document.getElementById('mysteryVal').textContent=answer;
      document.getElementById('mysteryNum').classList.add('reveal');
      document.getElementById('mysteryNum').style.borderColor='';
      // highlight
      document.querySelectorAll('.num-btn').forEach((b,i)=>{
        if(i===answer-1)b.classList.add('correct');
        if(i===selected-1&&answer!==selected)b.classList.add('wrong');
      });
      showResultFn(bet,selected,answer);
    }
  },100);
}

function showResultFn(bet,guess,answer){
  const rb=document.getElementById('resultBox');
  if(guess===answer){
    const win=bet*8; balance+=win; updateBal();
    wins++; streak++;
    rb.innerHTML=`<div style="font-size:36px">🎯</div><div class="result-msg" style="color:var(--green)">CORRECT! +${win} 🪙</div><div class="result-detail">You guessed ${guess} — Answer was ${answer}!</div>`;
    showToast('🎯 Perfect Guess! +'+win+' Coins','win');
    addHist('+'+win,true);
  } else {
    losses++; streak=0;
    rb.innerHTML=`<div style="font-size:36px">❌</div><div class="result-msg" style="color:var(--red)">WRONG! -${bet}</div><div class="result-detail">You guessed ${guess} — Answer was ${answer}</div>`;
    showToast('Wrong! Answer was '+answer,'lose');
    addHist('-'+bet,false);
  }
  document.getElementById('winsCount').textContent=wins;
  document.getElementById('lossesCount').textContent=losses;
  document.getElementById('streakCount').textContent=streak;

  setTimeout(()=>{
    document.getElementById('mysteryNum').classList.remove('reveal');
    document.getElementById('mysteryNum').style.borderColor='';
    document.querySelectorAll('.num-btn').forEach(b=>{b.disabled=false;b.classList.remove('selected','correct','wrong');});
    document.getElementById('guessBtn').disabled=false;
    selected=null;
  },2500);
}

function addHist(label,win){
  const row=document.getElementById('histRow');
  const el=document.createElement('div');
  el.className='hc '+(win?'hc-w':'hc-l');
  el.textContent=label; row.prepend(el);
  if(row.children.length>10)row.removeChild(row.lastChild);
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
