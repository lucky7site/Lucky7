<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lucky 7 – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--gold:#ffd700;--red:#ff4466;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);--card:rgba(255,255,255,0.04);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;}

body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(180,79,255,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 10% 90%,rgba(0,255,136,0.1) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 80%,rgba(0,200,255,0.08) 0%,transparent 60%);
  pointer-events:none;}

/* FLOATING PARTICLES */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.p{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:0.5}100%{transform:translateY(-20vh) scale(1);opacity:0}}

.wrap{position:relative;z-index:1;width:90%;max-width:400px;padding:20px 0;}

/* LOGO */
.logo-area{text-align:center;margin-bottom:28px;}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:38px;
  background:linear-gradient(90deg,var(--green),var(--blue),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:200%;animation:shift 3s linear infinite;letter-spacing:4px;}
@keyframes shift{0%{background-position:0%}100%{background-position:200%}}
.logo span{-webkit-text-fill-color:var(--gold);filter:drop-shadow(0 0 12px var(--gold));}
.logo-sub{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:2px;text-transform:uppercase;}

/* CARD */
.auth-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:24px;padding:28px 24px;backdrop-filter:blur(20px);box-shadow:0 0 40px rgba(180,79,255,0.08);}

/* TABS */
.auth-tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:14px;padding:4px;margin-bottom:24px;gap:0;}
.auth-tab{flex:1;padding:10px;text-align:center;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:10px;transition:.2s;color:var(--muted);}
.auth-tab.active{background:linear-gradient(135deg,rgba(180,79,255,0.25),rgba(0,200,255,0.15));color:var(--green);border:1px solid rgba(0,255,136,0.2);}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:13px;padding:13px 16px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(180,79,255,0.1);}
.form-input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,68,102,0.1);}
.form-input.valid{border-color:var(--green);}

/* PHONE PREFIX */
.phone-wrap{display:flex;gap:8px;}
.prefix{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:13px;padding:13px 14px;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;display:flex;align-items:center;}

/* ERROR / HINT */
.field-error{font-size:11px;color:var(--red);margin-top:5px;display:none;}
.field-error.show{display:block;}
.field-hint{font-size:11px;color:var(--muted);margin-top:5px;}

/* BTN */
.submit-btn{width:100%;border:none;border-radius:14px;padding:15px;margin-top:8px;
  background:linear-gradient(90deg,var(--purple),var(--blue));
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;
  color:#fff;cursor:pointer;letter-spacing:2px;transition:.2s;
  box-shadow:0 0 20px rgba(180,79,255,0.3);}
.submit-btn:active{transform:scale(0.97);}
.submit-btn:disabled{opacity:0.5;pointer-events:none;}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(10,10,20,0.97);border:1px solid var(--border);border-radius:14px;
  padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;
  z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--blue);color:var(--blue);}

/* PASSWORD STRENGTH */
.pwd-strength{margin-top:6px;height:3px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;}
.pwd-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0%;}

/* EYE TOGGLE */
.input-wrap{position:relative;}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);}

/* TERMS */
.terms{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;}
.terms span{color:var(--blue);cursor:pointer;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:11px;color:var(--muted);white-space:nowrap;}

/* WELCOME BACK */
.welcome-back{text-align:center;margin-bottom:14px;}
.wb-text{font-size:13px;color:var(--muted);}
.wb-name{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--green);margin-top:4px;}
</style>
</head>
<body>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<div class="wrap">
  <div class="logo-area">
    <div class="logo">Lucky<span>7</span></div>
    <div class="logo-sub">Premium Gaming Platform</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">🔑 LOGIN</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">✨ REGISTER</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div id="welcomeBack" class="welcome-back" style="display:none;">
        <div class="wb-text">Welcome back,</div>
        <div class="wb-name" id="wbName"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="loginUser" placeholder="Enter your username" autocomplete="username">
        <div class="field-error" id="loginUserErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="loginPass" placeholder="Enter your password" autocomplete="current-password">
          <button class="eye-btn" onclick="toggleEye('loginPass',this)">👁</button>
        </div>
        <div class="field-error" id="loginPassErr"></div>
      </div>
      <button class="submit-btn" onclick="doLogin()">LOGIN →</button>
      <div class="divider"><span>Don't have an account?</span></div>
      <div style="text-align:center;cursor:pointer;color:var(--blue);font-weight:700;font-size:14px;" onclick="switchTab('register')">Create Account ✨</div>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none;">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="regUser" placeholder="Choose a unique username" autocomplete="username" oninput="checkUsernameAvail(this.value)">
        <div class="field-error" id="regUserErr"></div>
        <div class="field-hint" id="regUserHint"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <div class="phone-wrap">
          <div class="prefix">🇮🇳 +91</div>
          <input type="tel" class="form-input" id="regPhone" placeholder="10-digit mobile" maxlength="10" oninput="validatePhone(this)">
        </div>
        <div class="field-error" id="regPhoneErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="regPass" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button class="eye-btn" onclick="toggleEye('regPass',this)">👁</button>
        </div>
        <div class="pwd-strength"><div class="pwd-fill" id="pwdFill"></div></div>
        <div class="field-error" id="regPassErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="regPass2" placeholder="Repeat password" autocomplete="new-password">
          <button class="eye-btn" onclick="toggleEye('regPass2',this)">👁</button>
        </div>
        <div class="field-error" id="regPass2Err"></div>
      </div>
      <button class="submit-btn" onclick="doRegister()">CREATE ACCOUNT →</button>
      <div class="terms">By registering you agree to our <span>Terms of Service</span> and <span>Privacy Policy</span>. This platform is for users 18+.</div>
      <div class="divider"><span>Already have an account?</span></div>
      <div style="text-align:center;cursor:pointer;color:var(--blue);font-weight:700;font-size:14px;" onclick="switchTab('login')">Login →</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PARTICLES ──────────────────────────────────────────
const pContainer=document.getElementById('particles');
for(let i=0;i<20;i++){
  const p=document.createElement('div'); p.className='p';
  const size=Math.random()*4+2;
  const colors=['#00ff88','#b44fff','#00c8ff','#ffd700'];
  p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*4)]};animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*6}s;`;
  pContainer.appendChild(p);
}

// ── USER DB (localStorage) ──────────────────────────────
function getUsers(){ return JSON.parse(localStorage.getItem('l7_users')||'[]'); }
function saveUsers(u){ localStorage.setItem('l7_users',JSON.stringify(u)); }

// ── CHECK LAST LOGGED-IN ────────────────────────────────
const lastUser=localStorage.getItem('l7_current_user');
if(lastUser){
  try{
    const u=JSON.parse(lastUser);
    document.getElementById('wbName').textContent=u.username;
    document.getElementById('welcomeBack').style.display='block';
    document.getElementById('loginUser').value=u.username;
  }catch(e){}
}

// ── TABS ────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-register').style.display=tab==='register'?'block':'none';
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  clearErrors();
}

function clearErrors(){
  document.querySelectorAll('.field-error').forEach(e=>{e.classList.remove('show');e.textContent='';});
  document.querySelectorAll('.form-input').forEach(i=>{i.classList.remove('error','valid');});
}

// ── EYE TOGGLE ──────────────────────────────────────────
function toggleEye(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}

// ── VALIDATION HELPERS ──────────────────────────────────
function showErr(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg; el.classList.add('show');
}
function clearErr(id){ const el=document.getElementById(id); el.classList.remove('show'); el.textContent=''; }

// Phone validation: Indian 10-digit
function validatePhone(inp){
  const val=inp.value.replace(/\D/g,'');
  inp.value=val;
  const valid=/^[6-9]\d{9}$/.test(val);
  if(val.length===10){
    inp.classList.toggle('valid',valid);
    inp.classList.toggle('error',!valid);
    if(!valid) showErr('regPhoneErr','Enter valid Indian mobile (starts with 6-9)');
    else clearErr('regPhoneErr');
  } else { inp.classList.remove('valid','error'); clearErr('regPhoneErr'); }
}

// Username availability check
let uCheckTimer=null;
function checkUsernameAvail(val){
  clearTimeout(uCheckTimer);
  const hint=document.getElementById('regUserHint');
  const inp=document.getElementById('regUser');
  clearErr('regUserErr'); inp.classList.remove('valid','error');
  if(!val||val.length<3){ hint.textContent=''; return; }
  if(!/^[a-zA-Z0-9_]+$/.test(val)){
    showErr('regUserErr','Only letters, numbers, underscores allowed');
    inp.classList.add('error'); hint.textContent=''; return;
  }
  hint.textContent='Checking...';
  uCheckTimer=setTimeout(()=>{
    const users=getUsers();
    const taken=users.some(u=>u.username.toLowerCase()===val.toLowerCase());
    if(taken){
      inp.classList.add('error'); inp.classList.remove('valid');
      showErr('regUserErr','Username already taken'); hint.textContent='';
    } else {
      inp.classList.add('valid'); inp.classList.remove('error');
      hint.textContent='✅ Username available!'; hint.style.color='var(--green)';
      clearErr('regUserErr');
    }
  },500);
}

// Password strength
function checkStrength(val){
  const fill=document.getElementById('pwdFill');
  let score=0;
  if(val.length>=6)score++;
  if(val.length>=10)score++;
  if(/[A-Z]/.test(val))score++;
  if(/[0-9]/.test(val))score++;
  if(/[^a-zA-Z0-9]/.test(val))score++;
  const pct=(score/5)*100;
  const colors=['#ff4466','#ff8c00','#ffd700','#00c8ff','#00ff88'];
  fill.style.width=pct+'%';
  fill.style.background=colors[Math.max(0,score-1)]||'var(--red)';
}

// ── REGISTER ────────────────────────────────────────────
function doRegister(){
  clearErrors();
  const username=document.getElementById('regUser').value.trim();
  const phone=document.getElementById('regPhone').value.trim();
  const pass=document.getElementById('regPass').value;
  const pass2=document.getElementById('regPass2').value;
  let valid=true;

  // Username
  if(!username||username.length<3){showErr('regUserErr','Username must be at least 3 characters');document.getElementById('regUser').classList.add('error');valid=false;}
  else if(!/^[a-zA-Z0-9_]+$/.test(username)){showErr('regUserErr','Only letters, numbers, underscores');document.getElementById('regUser').classList.add('error');valid=false;}

  // Phone
  if(!/^[6-9]\d{9}$/.test(phone)){showErr('regPhoneErr','Enter valid 10-digit Indian mobile number');document.getElementById('regPhone').classList.add('error');valid=false;}

  // Password
  if(pass.length<6){showErr('regPassErr','Password must be at least 6 characters');document.getElementById('regPass').classList.add('error');valid=false;}

  // Confirm
  if(pass!==pass2){showErr('regPass2Err','Passwords do not match');document.getElementById('regPass2').classList.add('error');valid=false;}

  if(!valid)return;

  const users=getUsers();

  // Check username duplicate (case-insensitive)
  if(users.some(u=>u.username.toLowerCase()===username.toLowerCase())){
    showErr('regUserErr','Username already taken. Choose another.');
    document.getElementById('regUser').classList.add('error');
    return;
  }

  // Check phone duplicate
  if(users.some(u=>u.phone===phone)){
    showErr('regPhoneErr','This phone number is already registered.');
    document.getElementById('regPhone').classList.add('error');
    return;
  }

  // Create user
  const newUser={
    id:'u'+Date.now(),
    username,
    phone,
    password:btoa(pass), // basic obfuscation
    balance:10, // welcome bonus
    joinDate:new Date().toLocaleDateString(),
    joinTime:new Date().toLocaleString()
  };
  users.push(newUser);
  saveUsers(users);

  // Set balance
  localStorage.setItem('l7_balance','10');
  localStorage.setItem('l7_current_user',JSON.stringify({id:newUser.id,username,phone}));

  showToast('🎉 Account created! Welcome bonus: 10 coins!','ok');
  setTimeout(()=>location.href='index.html',1500);
}

// ── LOGIN ────────────────────────────────────────────────
function doLogin(){
  clearErrors();
  const username=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  let valid=true;
  if(!username){showErr('loginUserErr','Enter your username');document.getElementById('loginUser').classList.add('error');valid=false;}
  if(!pass){showErr('loginPassErr','Enter your password');document.getElementById('loginPass').classList.add('error');valid=false;}
  if(!valid)return;

  const users=getUsers();
  const user=users.find(u=>u.username.toLowerCase()===username.toLowerCase() && u.password===btoa(pass));

  if(!user){
    showErr('loginUserErr','Incorrect username or password');
    document.getElementById('loginUser').classList.add('error');
    document.getElementById('loginPass').classList.add('error');
    showToast('❌ Wrong credentials','err');
    return;
  }

  // Restore this user's balance
  localStorage.setItem('l7_balance', user.balance||'0');
  localStorage.setItem('l7_current_user',JSON.stringify({id:user.id,username:user.username,phone:user.phone}));

  showToast('✅ Welcome back, '+user.username+'!','ok');
  setTimeout(()=>location.href='index.html',1000);
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('form-login').style.display!=='none') doLogin();
    else doRegister();
  }
});

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',3000);
}
</script>
</body>
</html>
