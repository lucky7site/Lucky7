<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mines Game – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,68,102,0.07) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--red);}
.balance-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}

.game-body{display:flex;flex-direction:column;align-items:center;padding:24px 20px;width:100%;gap:18px;}

/* MULTIPLIER BAR */
.mult-bar{width:90%;max-width:340px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
.mult-label{font-size:13px;color:var(--muted);font-weight:600;}
.mult-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--green);}
.potential-win{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--gold);}

/* GRID */
.mine-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:90%;max-width:320px;}
.cell{aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.cell::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,0.08),transparent);opacity:0;transition:.2s;}
.cell:active::before{opacity:1;}
.cell:active{transform:scale(0.93);}
.cell.revealed-safe{background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,200,255,0.1));border-color:rgba(0,255,136,0.4);cursor:default;animation:safePop .3s ease;}
@keyframes safePop{0%{transform:scale(0.8)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.cell.revealed-bomb{background:linear-gradient(135deg,rgba(255,68,102,0.3),rgba(180,0,0,0.2));border-color:rgba(255,68,102,0.5);cursor:default;animation:bombShake .3s ease;}
@keyframes bombShake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
.cell.disabled{pointer-events:none;}

/* CONTROLS */
.controls{width:90%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.row{display:flex;gap:10px;align-items:center;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:90px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--red);}
.mine-select{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;outline:none;flex:1;}
.btn{border:none;border-radius:14px;padding:13px 24px;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:.2s;flex:1;}
.btn:active{transform:scale(0.95);}
.btn:disabled{opacity:0.4;pointer-events:none;}
.btn-start{background:linear-gradient(90deg,#880022,var(--red));color:#fff;}
.btn-cash{background:linear-gradient(90deg,#006644,var(--green));color:#000;}

/* STATUS */
.status-box{width:90%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:12px 16px;text-align:center;font-weight:600;}
.status-msg{font-size:14px;}

/* PROGRESS */
.progress-bar{width:90%;max-width:320px;background:rgba(255,255,255,0.05);border-radius:8px;height:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:8px;transition:width .3s;width:0%;}

/* HIST */
.hist-row{display:flex;gap:6px;overflow-x:auto;width:90%;max-width:320px;padding-bottom:20px;scrollbar-width:none;}
.hist-row::-webkit-scrollbar{display:none;}
.hc{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;flex-shrink:0;}
.hc-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.hc-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">💣 Mines Game</div>
  <div class="balance-chip" id="balChip">🪙 0</div>
</header>

<div class="game-body">

  <div class="mult-bar">
    <div>
      <div class="mult-label">Current Multiplier</div>
      <div class="mult-val" id="multVal">1.00x</div>
    </div>
    <div style="text-align:right">
      <div class="mult-label">Potential Win</div>
      <div class="potential-win" id="potWin">0 🪙</div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="mine-grid" id="mineGrid"></div>

  <div class="controls">
    <div class="row">
      <span style="color:var(--muted);font-size:14px;font-weight:600;">Bet:</span>
      <input type="number" class="bet-input" id="betAmt" value="10" min="1">
      <select class="mine-select" id="mineCount">
        <option value="3">3 Mines (Easy)</option>
        <option value="5" selected>5 Mines (Normal)</option>
        <option value="8">8 Mines (Hard)</option>
        <option value="12">12 Mines (Insane)</option>
      </select>
    </div>
    <div class="row">
      <button class="btn btn-start" id="startBtn" onclick="startGame()">START GAME</button>
      <button class="btn btn-cash" id="cashBtn" onclick="cashOut()" disabled>CASH OUT</button>
    </div>
  </div>

  <div class="status-box" id="statusBox">
    <div class="status-msg" style="color:var(--muted)">Set your bet and click START GAME</div>
  </div>

  <div class="hist-row" id="histRow"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOTAL=25;
let balance=parseInt(localStorage.getItem('l7_balance')||'0');
let mines=[], revealed=[], gameActive=false, betAmount=0, safeRevealed=0;
function updateBal(){localStorage.setItem('l7_balance',balance);document.getElementById('balChip').textContent='🪙 '+balance;}
updateBal();

function buildGrid(){
  const grid=document.getElementById('mineGrid');
  grid.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const cell=document.createElement('div');
    cell.className='cell'; cell.dataset.idx=i;
    cell.textContent=''; // empty = hidden
    cell.addEventListener('click',()=>clickCell(i));
    grid.appendChild(cell);
  }
}
buildGrid();

function startGame(){
  const bet=parseInt(document.getElementById('betAmt').value)||10;
  if(bet<1||bet>balance){showToast('Not enough coins!','lose');return;}
  betAmount=bet; balance-=bet; updateBal();
  const numMines=parseInt(document.getElementById('mineCount').value);
  mines=[]; revealed=new Array(TOTAL).fill(false); safeRevealed=0; gameActive=true;

  // Place mines randomly
  while(mines.length<numMines){
    const r=Math.floor(Math.random()*TOTAL);
    if(!mines.includes(r))mines.push(r);
  }

  buildGrid();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('cashBtn').disabled=false;
  document.getElementById('mineCount').disabled=true;
  updateMult();
  setStatus('💣 Avoid the mines! Click safe tiles to increase multiplier.', 'var(--blue)');
}

function getMultiplier(){
  const numMines=parseInt(document.getElementById('mineCount').value)||5;
  const safeTiles=TOTAL-numMines;
  // Increase mult with each safe reveal
  let m=1;
  for(let i=0;i<safeRevealed;i++){
    m *= (safeTiles-i)/(TOTAL-numMines-i);
  }
  return Math.max(1, 1+(safeRevealed*numMines/(TOTAL-numMines))*0.8);
}

function updateMult(){
  const m=getMultiplier();
  document.getElementById('multVal').textContent=m.toFixed(2)+'x';
  document.getElementById('potWin').textContent=Math.floor(betAmount*m)+' 🪙';
  // progress
  const numMines=parseInt(document.getElementById('mineCount').value)||5;
  const safeTiles=TOTAL-numMines;
  document.getElementById('progressFill').style.width=(safeRevealed/safeTiles*100)+'%';
}

function clickCell(idx){
  if(!gameActive||revealed[idx])return;
  revealed[idx]=true;
  const cells=document.querySelectorAll('.cell');

  if(mines.includes(idx)){
    // BOMB!
    cells[idx].textContent='💥'; cells[idx].classList.add('revealed-bomb');
    // Reveal all mines
    setTimeout(()=>{
      mines.forEach(m=>{
        cells[m].textContent='💣';
        cells[m].classList.add('revealed-bomb');
      });
    },200);
    gameActive=false;
    document.getElementById('startBtn').disabled=false;
    document.getElementById('cashBtn').disabled=true;
    document.getElementById('mineCount').disabled=false;
    setStatus('💥 BOOM! You hit a mine! Lost '+betAmount+' coins.', 'var(--red)');
    showToast('💥 BOOM! Lost '+betAmount+' Coins','lose');
    addHist('-'+betAmount,false);
    document.querySelectorAll('.cell').forEach(c=>c.classList.add('disabled'));
  } else {
    cells[idx].textContent='💎'; cells[idx].classList.add('revealed-safe');
    safeRevealed++;
    updateMult();
    const numMines=parseInt(document.getElementById('mineCount').value)||5;
    if(safeRevealed===TOTAL-numMines){
      // All safe tiles found!
      cashOut();
    } else {
      setStatus('✅ Safe! Keep going or cash out. Multiplier: '+getMultiplier().toFixed(2)+'x', 'var(--green)');
    }
  }
}

function cashOut(){
  if(!gameActive)return;
  gameActive=false;
  const win=Math.floor(betAmount*getMultiplier());
  balance+=win; updateBal();
  document.getElementById('startBtn').disabled=false;
  document.getElementById('cashBtn').disabled=true;
  document.getElementById('mineCount').disabled=false;
  // Reveal mines
  const cells=document.querySelectorAll('.cell');
  mines.forEach(m=>{ cells[m].textContent='💣'; cells[m].classList.add('revealed-bomb'); });
  setStatus('💰 Cashed out! Won '+win+' coins at '+getMultiplier().toFixed(2)+'x', 'var(--green)');
  showToast('Cashed out! +'+win+' Coins 💰','win');
  addHist('+'+win,true);
  document.querySelectorAll('.cell').forEach(c=>c.classList.add('disabled'));
}

function setStatus(msg, color){
  const box=document.getElementById('statusBox');
  box.querySelector('.status-msg').textContent=msg;
  box.querySelector('.status-msg').style.color=color||'var(--text)';
}

function addHist(label,win){
  const row=document.getElementById('histRow');
  const el=document.createElement('div');
  el.className='hc '+(win?'hc-w':'hc-l');
  el.textContent=label; row.prepend(el);
  if(row.children.length>10)row.removeChild(row.lastChild);
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
